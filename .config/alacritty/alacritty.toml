[selection]
save_to_clipboard = true
semantic_escape_chars = ",│`|\"' ()[]{}<>\t"

[scrolling]
history = 50000

# Shift+Enter inserts a newline (sends ESC+CR, which Claude Code reads as newline)
[[keyboard.bindings]]
key = "Enter"
mods = "Shift"
chars = "\u001b\r"

[window]
padding = { x = 6, y = 6}

[[hints.enabled]]
command = "xdg-open"
hyperlinks = true
mouse.enabled = true
mouse.mods = "Control"
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\^⟨⟩`]+"

[general]
# import all configuration files
import = [
    "~/.config/alacritty/colorscheme.toml",
    "~/.config/alacritty/env.toml",
    "~/.config/alacritty/fonts.toml",
  ]

[colors.cursor]
text = "CellBackground"
cursor = "#ff9e64"
